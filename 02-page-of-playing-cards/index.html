<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thẻ Bài Tây</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Thẻ Bài Tây</h1>

    <main id="playing-cards">
      <div class="card">
        <div class="left black">A<br />♠</div>
        <div class="middle black"><span>♠</span></div>
        <div class="right black">A<br />♠</div>
      </div>

      <div class="card">
        <div class="left red">K<br />♥</div>
        <div class="middle red"><span>♥</span></div>
        <div class="right red">K<br />♥</div>
      </div>

      <div class="card">
        <div class="left red">Q<br />♦</div>
        <div class="middle red"><span>♦</span></div>
        <div class="right red">Q<br />♦</div>
      </div>

      <div class="card">
        <div class="left black">J<br />♣</div>
        <div class="middle black"><span>♣</span></div>
        <div class="right black">J<br />♣</div>
      </div>

      <div class="card">
        <div class="left red">10<br />♥</div>
        <div class="middle red">
          <span>♥ ♥</span><span>♥ ♥</span><span>♥ ♥</span><span>♥ ♥</span
          ><span>♥ ♥</span>
        </div>
        <div class="right red">10<br />♥</div>
      </div>

      <div class="card">
        <div class="left black">4<br />♠</div>
        <div class="middle black"><span>♠ ♠</span><span>♠ ♠</span></div>
        <div class="right black">4<br />♠</div>
      </div>
    </main>
  </body>
</html>
