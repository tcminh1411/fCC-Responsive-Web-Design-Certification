<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reading Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Book Inventory</h1>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>
        <tr class="read">
          <td>Truyện Kiều</td>
          <td>Nguyễn Du</td>
          <td>Thơ</td>
          <td>
            <span class="status">Read</span>
          </td>
          <td>
            <span class="rate one"
              ><span class="one"> </span>
              <span class="two"></span>
              <span class="three"></span>
            </span>
          </td>
        </tr>
        <tr class="read">
          <td>Tắt đèn</td>
          <td>Ngô Tất Tố</td>
          <td>Tiểu thuyết</td>
          <td>
            <span class="status">Read</span>
          </td>
          <td>
            <span class="rate one"
              ><span class="one"> </span>
              <span class="two"></span>
              <span class="three"></span>
            </span>
          </td>
        </tr>
        <tr class="to-read">
          <td>Lão Hạc</td>
          <td>Nam Cao</td>
          <td>Truyện ngắn</td>
          <td>
            <span class="status">To Read</span>
          </td>
          <td>
            <span class="rate two"
              ><span class="one"> </span>
              <span class="two"></span>
              <span class="three"></span>
            </span>
          </td>
        </tr>
        <tr class="to-read">
          <td>Số đỏ</td>
          <td>Vũ Trọng Phụng</td>
          <td>Tiểu thuyết</td>
          <td>
            <span class="status">To Read</span>
          </td>
          <td>
            <span class="rate three"
              ><span class="one"> </span>
              <span class="two"></span>
              <span class="three"></span>
            </span>
          </td>
        </tr>
        <tr class="in-progress">
          <td>Dế Mèn phiêu lưu ký</td>
          <td>Tô Hoài</td>
          <td>Thiếu nhi</td>
          <td>
            <span class="status">In Progress</span>
          </td>
          <td>
            <span class="rate one"
              ><span class="one"> </span>
              <span class="two"></span>
              <span class="three"></span>
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
